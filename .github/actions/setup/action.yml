# yaml-language-server: $schema=https://json.schemastore.org/github-action.json
name: Setup
description: Install just and local development dependencies.

runs:
  using: composite
  steps:
    - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # action v4, installs just 1.50.0
      with:
        just-version: 1.50.0

    - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # action v4
      with:
        package_json_file: dev/package.json

    - name: Install local development dependencies
      shell: bash
      working-directory: dev
      run: pnpm install --frozen-lockfile
